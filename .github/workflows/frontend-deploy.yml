name: Deploy Frontend to GitHub Pages

# Builds the React SPA and publishes `frontend/dist/` (after adding the
# SPA-fallback `404.html` and `.nojekyll`) to the `gh-pages` branch.
#
# Required secrets: none — uses the workflow's GITHUB_TOKEN with `pages: write`
# and `id-token: write` permissions (configured at the job level below).
#
# Manual trigger: Actions tab → "Deploy Frontend to GitHub Pages" → Run workflow.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Avoid building & deploying when only docs / non-frontend files change.
# Saves CI minutes. Tweak paths to suit the repo layout.
concurrency:
  group: deploy-frontend
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to push the gh-pages branch
      pages: write     # for the official deploy action
      id-token: write  # for OIDC verification (if using the official action)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Generate static demo data
        # Pre-renders the public/static-data/*.json bundle used by the
        # no-backend GitHub Pages deployment. If the script isn't present
        # in this checkout, the step is skipped silently.
        run: |
          if [ -f tools/gen_static_data.py ]; then
            python3 tools/gen_static_data.py
          else
            echo "gen_static_data.py not found, skipping"
          fi

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
          # SPA fallback: GitHub Pages serves 404.html for unknown paths, so
          # we symlink it to the built index.html. actions-gh-pages supports
          # keeping a custom 404.html that we drop in beforehand.
          keep_files: false
          enable_jekyll: false
          exclude_assets: ''
          # Atomic force_orphan keeps the gh-pages branch history clean.
          force_orphan: true
          full_commit_message: |
            deploy: ${{ github.event.head_commit.message }}
            [skip ci]

  success:
    name: Notify success
    if: success()
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Print summary
        run: |
          echo "Deployed frontend to gh-pages branch."
          echo "Live URL: https://badhope.github.io/MCP-HUB/"
