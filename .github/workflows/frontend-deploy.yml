name: Deploy Frontend to GitHub Pages

# Builds the React SPA and publishes it via the official GitHub Pages
# deployment action (actions/deploy-pages). Requires the repo's Pages
# source to be set to "GitHub Actions" (not a branch).
#
# Required secrets: none — uses the workflow's GITHUB_TOKEN with
# `pages: write` and `id-token: write` permissions (configured at the
# job level below).
#
# Manual trigger: Actions tab → "Deploy Frontend to GitHub Pages" → Run workflow.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Avoid building & deploying when only docs / non-frontend files change.
# Saves CI minutes. Tweak paths to suit the repo layout.
concurrency:
  group: deploy-frontend
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read   # to checkout
      pages: write     # to deploy to GitHub Pages
      id-token: write  # for OIDC verification
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Generate static demo data
        # Pre-renders the public/static-data/*.json bundle used by the
        # no-backend GitHub Pages deployment. If the script isn't present
        # in this checkout, the step is skipped silently.
        run: |
          if [ -f tools/gen_static_data.py ]; then
            python3 tools/gen_static_data.py
          else
            echo "gen_static_data.py not found, skipping"
          fi

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Add SPA fallback + nojekyll
        # GitHub Pages serves 404.html for unknown paths, so we copy the
        # built index.html there for client-side routing. .nojekyll tells
        # Pages not to run files through the Jekyll preprocessor.
        run: |
          cp frontend/dist/index.html frontend/dist/404.html
          touch frontend/dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
