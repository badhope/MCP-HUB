name: Lint

# Lightweight formatting/lint checks. Runs on every push and PR to main.
# Catches style issues quickly without spinning up the full Python test matrix.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dev tools
        # flake8 3.3.2 was pinned historically but that version was never
        # published to PyPI (it jumped 3.0.4 → 3.4.0), causing the lint
        # job to fail at install time. Pin to a real released version.
        run: pip install 'flake8>=7,<8' black isort mypy

      - name: Secret scan (fast fail)
        run: python tools/secret_scanner.py .

      - name: flake8 (syntax + unused)
        # E501 line-length is enforced via .flake8; we skip W503 (black-compatible)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: black format check
        run: black --check --diff .

      - name: isort check
        # --gitignore makes isort skip vendored / gitignored trees like
        # `servers/` so a third-party file in there can't break the job.
        run: isort --check-only --diff --profile=black --gitignore .

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npm run check
