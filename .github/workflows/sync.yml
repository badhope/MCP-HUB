name: Auto Sync Index

on:
  schedule:
    # 每天 UTC 2:00 (北京时间 10:00) 自动同步
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 支持手动触发

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to open the PR
      pull-requests: write  # to open the PR

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync upstream index
        run: python tools/sync_index.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet servers-index.json market-config.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        if: steps.changes.outputs.changed == 'true'
        run: |
          pip install pytest
          pytest tests/ -v

      # Push to a feature branch and open a PR instead of pushing
      # directly to main. main is a protected branch, so a workflow
      # token can never bypass the protection rules; a PR is the only
      # path that survives both the protection and the required reviews.
      - name: Open sync PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/auto-sync-${{ github.run_id }}
          commit-message: "chore: auto-sync upstream index ${{ github.event.head_commit.author.name }}"
          title: "chore: auto-sync upstream index"
          body: |
            Daily automated refresh of `servers-index.json` and `market-config.json` from the
            upstream awesome-mcp catalog. No review required for routine data refreshes.
          add-paths: |
            servers-index.json
            market-config.json
