name: Auto Sync Index

on:
  schedule:
    # 每天 UTC 2:00 (北京时间 10:00) 自动同步
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Sync upstream index
        run: python tools/sync_index.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet servers-index.json market-config.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        if: steps.changes.outputs.changed == 'true'
        run: |
          pip install pytest
          pytest tests/ -v

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add servers-index.json market-config.json
          git commit -m "chore: auto-sync upstream index $(date +%Y-%m-%d)"
          git push
