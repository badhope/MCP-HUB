# Pre-commit configuration for the MCP Hub project.
# Install pre-commit (https://pre-commit.com/) and run:
#   pre-commit install
#   pre-commit run --all-files
#
# This is the Python pre-commit framework. We also ship a standalone
# shell-based hook in tools/pre-commit that has no Python dependency —
# both check for secrets.
repos:
  - repo: local
    hooks:
      - id: secret-scanner
        name: Secret scanner
        description: Detect accidentally committed credentials
        entry: python tools/secret_scanner.py
        language: system
        types: [text]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: ^(.*\.md|.*\.map|.*\.min\.js)$
      - id: end-of-file-fixer
        exclude: ^(.*\.md|.*\.map|.*\.min\.js)$
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-merge-conflict
      - id: detect-private-key
        # Catches PEM private keys even if secret_scanner misses them
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.13.0
    hooks:
      - id: eslint
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$
        additional_dependencies: []
        types: [file]
