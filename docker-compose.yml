# MCP Hub Full Stack - Docker Compose
version: '3.8'

services:
  backend:
    build:
      context: .
      target: development
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped
