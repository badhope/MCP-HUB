    <!-- JSON-LD structured data: tells search engines this is a SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "MCP Hub",
        "alternateName": "MCP-HUB",
        "url": "https://badhope.github.io/MCP-HUB/",
        "description": "The Universal MCP Tool Market — 4,403+ curated Model Context Protocol servers, REST API, web UI, and AI-agent friendly discovery for Claude, Cursor, ChatGPT, and more.",
        "inLanguage": ["en", "zh-CN"],
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://badhope.github.io/MCP-HUB/servers?search={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        },
        "publisher": {
          "@type": "Organization",
          "name": "MCP Hub",
          "url": "https://github.com/badhope/MCP-HUB",
          "logo": {
            "@type": "ImageObject",
            "url": "https://badhope.github.io/MCP-HUB/favicon.svg"
          }
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "MCP Hub",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "softwareVersion": "2.0.1",
        "url": "https://badhope.github.io/MCP-HUB/",

        "license": "https://github.com/badhope/MCP-HUB/blob/main/LICENSE"
      }
    </script>

    <title>MCP Hub — The Universal MCP Tool Market</title>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
