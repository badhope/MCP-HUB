    <!-- Dark-mode FOUC prevention: set <html class="dark"> BEFORE first paint.
         Reads from localStorage('mcp-hub-theme') first, then falls back to
         the OS preference. Must be a blocking inline script (no defer/async). -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('mcp-hub-theme');
          var prefersDark = window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored === 'dark' || (!stored && prefersDark);
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) { /* localStorage may be unavailable */ }
      })();
    </script>
