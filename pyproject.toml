# Phase 6+: this is a static SPA + build-time Python data pipeline.
# The previous FastAPI/uvicorn/pydantic/httpx runtime dependencies are
# gone; the only Python that runs in CI / cron is `tools/sync_index.py`
# + `tools/gen_static_data.py`, both of which use only the standard
# library. `pytest` is pulled in directly by `.github/workflows/ci.yml`.

[tool.black]
line-length = 100
target-version = ['py39', 'py310', 'py311']

[tool.isort]
profile = "black"
# isort 8.x renamed `line-length` → `line_length`; the hyphenated form
# now raises UnsupportedSettings on import. Use the new key.
line_length = 100
