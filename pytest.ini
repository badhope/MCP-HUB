[pytest]
pythonpath = .
# Without testpaths, pytest auto-discovers test_*.py / *_test.py files
# anywhere in the tree — including the `servers/` subdirectory, which
# is a checkout of upstream MCP reference implementations (dify,
# gemini-cli, memory, filesystem, …) and contains their own test
# suites that need a different Python environment. Pin collection to
# the project's own test tree.
testpaths = tests
